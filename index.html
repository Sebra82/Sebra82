<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBRA V40.1 Static Historical Matrix Suite</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-card: #0D1527;
            --bg-input: #121B32;
            --border-glow: #1E2E54;
            --border-active: #38BDF8;
            --text-main: #E2E8F0;
            --text-muted: #64748B;
            --accent-blue: #0EA5E9;
            --accent-green: #10B981;
            --accent-warn: #F59E0B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 24px; font-size: 14px; overflow-x: hidden; }
        .system-container { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .sys-header {
            background: linear-gradient(135deg, #091020 0%, #050A14 100%);
            border: 1px solid var(--border-glow); border-radius: 12px; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .sys-title-block { display: flex; flex-direction: column; gap: 4px; }
        .sys-title { font-size: 1.3rem; font-weight: 800; letter-spacing: 1.5px; color: #FFF; }
        .sys-subtitle { font-size: 0.78rem; color: var(--text-muted); font-family: monospace; }
        .sys-badge { font-family: monospace; font-size: 0.78rem; color: var(--accent-green); background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); padding: 6px 12px; border-radius: 6px; }
        .filter-deck-card {
            background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 10px; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
        }
        .horizon-buttons-group { display: flex; gap: 8px; }
        .horizon-btn {
            background: var(--bg-input); border: 1px solid var(--border-glow); color: var(--text-muted);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; transition: all 0.2s ease;
        }
        .horizon-btn.active {
            background: var(--accent-blue); color: #FFF; border-color: var(--border-active);
            box-shadow: 0 0 12px rgba(14, 165, 233, 0.4);
        }
        .workspace-grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
        .control-sidebar { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 10px; padding: 18px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
        .sidebar-section-title { font-size: 0.88rem; font-weight: 700; color: #FFF; text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 4px; border-bottom: 1px solid var(--border-glow); }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .submit-btn { background: var(--accent-blue); color: #FFF; border: none; padding: 10px; border-radius: 6px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
        .submit-btn:hover { background: #0284C7; }
        select, input[type="number"], textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border-glow); color: var(--text-main); padding: 8px 10px; border-radius: 6px; font-size: 0.82rem; outline: none; }
        select:focus, input:focus { border-color: var(--border-active); }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; border: 1px solid var(--border-glow); }
        .switch-wrap { position: relative; display: inline-block; width: 38px; height: 20px; }
        .switch-wrap input { display: none; }
        .slider-node { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1E293B; border-radius: 30px; transition: 0.2s; }
        .slider-node:before { position: absolute; content: ""; height: 14px; width: 16px; left: 3px; bottom: 3px; background-color: #FFF; border-radius: 50%; transition: 0.2s; }
        input:checked + .slider-node { background-color: var(--accent-blue); }
        input:checked + .slider-node:before { transform: translateX(16px); }
        
        .payload-area { height: 100px; font-family: monospace; font-size: 0.72rem; background: #04070D; color: var(--accent-green); border-color: var(--border-glow); resize: none; text-align: center; font-weight: bold; }
        .chart-card-wrapper { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 10px; padding: 16px; display: none; flex-direction: column; gap: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
        .chart-svg-viewport { width: 100%; height: 160px; background: #050914; border: 1px solid var(--border-glow); border-radius: 6px; }
        .main-content { display: flex; flex-direction: column; gap: 16px; }
        .summary-dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .metric-tile { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 10px; padding: 14px 18px; display: flex; flex-direction: column; gap: 4px; position: relative; overflow: hidden; }
        .metric-tile label { font-size: 0.72rem; color: var(--text-muted); }
        .metric-value { font-size: 1.4rem; font-weight: 700; font-family: monospace; color: #FFF; position: relative; z-index: 2; }
        .ledger-container { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
        .ledger-title-bar { padding: 12px 20px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; background: #0A101F; border-bottom: 1px solid var(--border-glow); }
        .table-scroll { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #070B14; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid var(--border-glow); }
        td { padding: 12px 16px; border-bottom: 1px solid #10192E; font-size: 0.82rem; }
        tr:last-child td { border-bottom: none; }
        
        .news-injection-row { background: #050811; font-size: 0.78rem; color: var(--accent-blue); line-height: 1.6; }
        .news-box-content { padding: 8px 16px; border-bottom: 1px solid var(--border-glow); }
        .pos-delta { color: var(--accent-green); font-weight: 600; font-family: monospace; }
        .neg-delta { color: var(--accent-warn); font-weight: 600; font-family: monospace; }
        .font-mono { font-family: monospace; font-size: 0.82rem; }
        .quantum-wave-canvas { position: absolute; bottom: 0; right: 0; width: 100px; height: 40px; opacity: 0.40; z-index: 1; pointer-events: none; }
        .quantum-swirl-canvas { position: absolute; top: -5px; right: -5px; width: 50px; height: 50px; opacity: 0.35; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
<div class="system-container">
    <header class="sys-header">
        <div class="sys-title-block">
            <div class="sys-title">🌌 SEBRA V40.1 DECOUPLED MATRIX WORKSPACE</div>

    <div class="filter-deck-card">

            <div class="chart-card-wrapper" id="trajectoryChartWrapper">

<script>
    let PAYLOAD_SNAPSHOT_MATRIX_POOL = {};
    let STRATEGIC_ACTIVE_HORIZON = 'current'; 
    const FX_USDBGB_CONVERSION_RATE = 0.78;   

    const PORTFOLIO_LEDGER_LEDGER = {
        "LAES": { volumeShares: 1000, entryCostGBP: 2.50, news: "SEALSQ H1 revenue up +115% with an active $495M cash fortress.", weight: 1.45 },
        "SPCX": { volumeShares: 500,  entryCostGBP: 120.00, news: "SpaceX consolidates post-IPO structural float floor guidelines.", weight: 1.22 },
        "TSLA": { volumeShares: 100,  entryCostGBP: 350.00, news: "Tesla pushes updated full FSD Beta telemetry across enterprise frames.", weight: 1.05 },
        "NVDA": { volumeShares: 200,  entryCostGBP: 110.00, news: "NVIDIA accelerators scale ahead of crucial upcoming Q2 earnings print.", weight: 1.35 },
        "PLTR": { volumeShares: 1500, entryCostGBP: 28.00, news: "Palantir enterprise AIP contracts across federal infrastructure grids.", weight: 1.18 },
        "AAPL": { volumeShares: 120,  entryCostGBP: 175.00, news: "Apple isolates decentralized silicon architectural components locally.", weight: 1.08 },
        "MSFT": { volumeShares: 80,   entryCostGBP: 400.00, news: "Microsoft deploys custom cloud models to decrease operational latency.", weight: 1.12 },
        "AMD":  { volumeShares: 140,  entryCostGBP: 155.00, news: "AMD captures localized server processing market shares past macro walls.", weight: 1.15 },
        "COIN": { volumeShares: 90,   entryCostGBP: 210.00, news: "Coinbase clearing tranches expand cleanly following digital liquidity inflows.", weight: 1.25 },
        "BTC":  { volumeShares: 0.8,   entryCostGBP: 52000.00, news: "Bitcoin network difficulty maps absolute structural network hash breakouts.", weight: 1.40 }
    };

    function processSebraGeometryLayers(h1, h2, h3, biasFactor = 1.0) {
        let w_raw = (Math.abs(h1 - h3) / h3) * h1;
        let w_final = w_raw * biasFactor;
        let total_product = h1 * h2 * h3 * w_final;
        let tm_index = total_product <= 0 ? 0.0001 : Math.pow(total_product, 0.25);
        let hyper_volume = (Math.sqrt(5) / 96) * Math.pow(Math.sqrt(2.5) * tm_index, 4);
        return { w: w_final, tm: tm_index, v4: hyper_volume, cm: (h1 + h2 + h3 + w_final) / 4 };
    }

    function executeQuarticInversion(target_tm, h2, h3, biasFactor = 1.0) {
        let convergence_price = 0.01; let minimum_residual = Infinity;
        let exploration_limit = Math.max(h3 * 8, 160000.0); 
        let total_steps = 25000; 
        let allocation_step = exploration_limit / total_steps;

        for (let idx = 0; idx <= total_steps; idx++) {
            let trial_p = 0.01 + (idx * allocation_step);
            let trial_w = ((Math.abs(trial_p - h3) / h3) * trial_p) * biasFactor;
            let trial_tm = Math.pow(trial_p * h2 * h3 * trial_w, 0.25);
            let residual_delta = Math.abs(trial_tm - target_tm);
            if (residual_delta < minimum_residual) { minimum_residual = residual_delta; convergence_price = trial_p; }
        }
        return convergence_price;
    }
    function toggleTrajectoryGraphVisibility() {
        const toggleState = document.getElementById("graphToggle").checked;
        document.getElementById("trajectoryChartWrapper").style.display = toggleState ? "flex" : "none";
    }

    function switchActiveHorizon(selectedHorizon) {
        STRATEGIC_ACTIVE_HORIZON = selectedHorizon;
        document.querySelectorAll('.horizon-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn_${selectedHorizon}`).classList.add('active');
        runSebraSystemEngine();
    }

    function executeManualPayloadSubmit() {
        const inputPortal = document.getElementById("bulkInputPortal");
        const textPayload = inputPortal.value;
        const selectMenu = document.getElementById("symbolSelect");
        const lines = textPayload.trim().split('\n');
        if (lines.length <= 1) return;
        
        const previousSelection = selectMenu.value;
        PAYLOAD_SNAPSHOT_MATRIX_POOL = {};

        for (let i = 1; i < lines.length; i++) {
            let cleanLine = lines[i].replace(/[\r\n]+/g, '').trim();
            let row = cleanLine.split(',');
            if (row.length < 4) continue;
            
            let symbol = row[0].toUpperCase().trim();
            let chronoDateStr = row[1].trim();
            let spotClose = parseFloat(row[2]);
            let macroBase = parseFloat(row[3]);
            
            if (isNaN(spotClose) || isNaN(macroBase)) continue;

            let targetNodeDate = new Date(chronoDateStr);
            let activeHorizonAnchor = new Date("2026-07-15");
            let chronologicalDistanceDays = (activeHorizonAnchor - targetNodeDate) / (1000 * 60 * 60 * 24);
            
            if (chronologicalDistanceDays > 180 || chronologicalDistanceDays < 0) continue;

            if (!PAYLOAD_SNAPSHOT_MATRIX_POOL[symbol]) { PAYLOAD_SNAPSHOT_MATRIX_POOL[symbol] = []; }
            let metaLedger = PORTFOLIO_LEDGER_LEDGER[symbol] || { str: "Custom configuration matrix asset row tracking node.", weight: 1.10 };

            PAYLOAD_SNAPSHOT_MATRIX_POOL[symbol].push({
                timestamp: chronoDateStr, actualPrice: spotClose, targetH3: macroBase,
                newsString: metaLedger.news || "Matrix data re-routed seamlessly.",
                weightAlpha: metaLedger.weight || 1.10, computedH2: spotClose
            });
        }

        selectMenu.innerHTML = "";
        Object.keys(PAYLOAD_SNAPSHOT_MATRIX_POOL).forEach(symbol => {
            let newOption = document.createElement("option"); newOption.value = symbol; newOption.text = symbol; selectMenu.add(newOption);
        });

        inputPortal.value = "";
        inputPortal.placeholder = "[ INGESTION POOL LOCKED — DECOUPLED LOOP RUNNING ]";

        if (selectMenu.options.length > 0) {
            let checkMatch = Array.from(selectMenu.options).some(opt => opt.value === previousSelection);
            selectMenu.value = checkMatch ? previousSelection : selectMenu.options[0].value;
            runSebraSystemEngine();
        }
    }
    function renderDynamicTrajectoryCurve(activePrice, p3m, p6m, p12m) {
        const svg = document.getElementById("svgGraphViewport");
        if (!svg) return;
        svg.innerHTML = ""; 
        
        const coordinates = [
            { x: 40,  y: activePrice, lbl: "Current" },
            { x: 140, y: p3m,         lbl: "3 Months" },
            { x: 240, y: p6m,         lbl: "6 Months" },
            { x: 340, y: p12m,        lbl: "12 Months" }
        ];

        const prices = [activePrice, p3m, p6m, p12m];
        const maxPrice = Math.max(...prices) * 1.1;
        const minPrice = Math.min(...prices) * 0.9;
        const priceRange = maxPrice - minPrice || 1.0;

        let pathD = "";
        coordinates.forEach((pt, i) => {
            let scaledY = 140 - ((pt.y - minPrice) / priceRange) * 110;
            pt.scaledX = pt.x; pt.scaledY = scaledY;
            pathD += (i === 0) ? `M ${pt.scaledX} ${pt.scaledY}` : ` L ${pt.scaledX} ${pt.scaledY}`;
        });

        let pathElement = document.createElementNS("http://w3.org", "path");
        pathElement.setAttribute("d", pathD); pathElement.setAttribute("stroke", "#38BDF8");
        pathElement.setAttribute("stroke-width", "2.5"); pathElement.setAttribute("fill", "none");
        svg.appendChild(pathElement);

        coordinates.forEach(pt => {
            let circle = document.createElementNS("http://w3.org", "circle");
            circle.setAttribute("cx", pt.scaledX); circle.setAttribute("cy", pt.scaledY);
            circle.setAttribute("r", "4"); circle.setAttribute("fill", "#FFF");
            svg.appendChild(circle);

            let txt = document.createElementNS("http://w3.org", "text");
            txt.setAttribute("x", pt.scaledX - 15); txt.setAttribute("y", pt.scaledY - 10);
            txt.setAttribute("fill", "#64748B"); txt.setAttribute("font-size", "9px");
            txt.textContent = `${pt.lbl}: $${pt.y.toFixed(2)}`;
            svg.appendChild(txt);
        });
    }
    let quantumGlobalTimePhase = 0;
    
    function paintQuantumSwirlVortex(canvasId, calculationMagnitude) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width = 50; const h = canvas.height = 50;
        ctx.clearRect(0, 0, w, h);
        
        let spinSpeed = Math.min(Math.max(calculationMagnitude * 0.05, 0.02), 0.35);
        let spiralRadius = Math.min(Math.max(Math.log10(calculationMagnitude + 1) * 4, 3.0), 22.0);
        
        ctx.save(); ctx.translate(w / 2, h / 2); ctx.rotate(quantumGlobalTimePhase * spinSpeed * 2);
        ctx.beginPath(); ctx.strokeStyle = "rgba(56, 189, 248, 0.4)"; ctx.lineWidth = 1.2;
        
        for (let theta = 0; theta < 30; theta += 0.1) {
            let r = (spiralRadius / 30) * theta;
            let x = r * Math.cos(theta); let y = r * Math.sin(theta);
            if (theta === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke(); ctx.restore();
    }

    function animateQuantumDisplayWave(hypervolumeMetric) {
        const canvas = document.getElementById("quantumDisplayCanvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width = 100; const h = canvas.height = 40;
        ctx.clearRect(0, 0, w, h);
        let energyAmplitude = Math.min(Math.max(Math.log10(hypervolumeMetric + 1) * 6, 2.0), 18.0);
        
        ctx.beginPath(); ctx.strokeStyle = "#38BDF8"; ctx.lineWidth = 1.5;
        for (let x = 0; x < w; x++) {
            let y = (h / 2) + Math.sin((x * 0.1) + quantumGlobalTimePhase) * energyAmplitude;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        quantumGlobalTimePhase += 0.12;
        
        paintQuantumSwirlVortex("swirlCanvas_W", window.activeMetricTracker_W || 1.0);
        paintQuantumSwirlVortex("swirlCanvas_TM", window.activeMetricTracker_TM || 1.0);
        paintQuantumSwirlVortex("swirlCanvas_CM", window.activeMetricTracker_CM || 1.0);
        requestAnimationFrame(() => animateQuantumDisplayWave(window.currentHypervolumeTracker || 1.0));
    }

    function runSebraSystemEngine() {
        const dropdownFocusSymbol = document.getElementById("symbolSelect").value;
        const UniverseFrame = document.getElementById("frameSelect").value;
        const activeNewsState = document.getElementById("newsSwitch").checked;
        const manualSandboxValue = parseFloat(document.getElementById("warpPriceInput").value) || 1.0;
        const gridBodyElement = document.getElementById("ledgerInjectTarget");
        
        if (!dropdownFocusSymbol) return;
        gridBodyElement.innerHTML = ""; 
        document.getElementById("ledgerTitleAnchor").innerText = `Unified Relational Tensor Hub :: Active Horizon Filter -> [${STRATEGIC_ACTIVE_HORIZON.toUpperCase()}]`;

        Object.keys(PAYLOAD_SNAPSHOT_MATRIX_POOL).forEach(symbol => {
            const dataRows = PAYLOAD_SNAPSHOT_MATRIX_POOL[symbol];
            if (!dataRows || dataRows.length === 0) return;
            
            dataRows.forEach((rowItem, rowIndex) => {
                if (STRATEGIC_ACTIVE_HORIZON !== 'current' && rowIndex > 0) return;

                let rowShares = PORTFOLIO_LEDGER_LEDGER[symbol]?.volumeShares || 0;
                let rowEntryPriceGBP = PORTFOLIO_LEDGER_LEDGER[symbol]?.entryCostGBP || 0;
                let rowBias = activeNewsState ? (rowItem.weightAlpha || 1.10) : 1.0;

                let eval_h1 = (symbol === dropdownFocusSymbol && UniverseFrame === "FRAME_B" && rowIndex === 0) ? manualSandboxValue : rowItem.actualPrice;
                let eval_h2 = (symbol === dropdownFocusSymbol && UniverseFrame === "FRAME_B" && rowIndex === 0) ? ((rowItem.computedH2 * 4 + manualSandboxValue) / 5) : rowItem.computedH2;
                let eval_h3 = rowItem.targetH3;

                let baseMetrics = processSebraGeometryLayers(eval_h1, eval_h2, eval_h3, rowBias);
                
                if (symbol === dropdownFocusSymbol && rowIndex === 0) {
                    document.getElementById("wDisplay").innerText = baseMetrics.w.toFixed(4);
                    document.getElementById("tmDisplay").innerText = baseMetrics.tm.toFixed(4);
                    document.getElementById("v4Display").innerText = baseMetrics.v4.toFixed(4);
                    document.getElementById("cmDisplay").innerText = baseMetrics.cm.toFixed(4);
                    
                    window.activeMetricTracker_W = baseMetrics.w;
                    window.activeMetricTracker_TM = baseMetrics.tm;
                    window.activeMetricTracker_CM = baseMetrics.cm;
                    window.currentHypervolumeTracker = baseMetrics.v4;

                    let p3 = executeQuarticInversion(baseMetrics.tm * 1.30, eval_h2, eval_h3, rowBias);
                    let p6 = executeQuarticInversion(baseMetrics.tm * 1.45, eval_h2, eval_h3, rowBias);
                    let p12 = executeQuarticInversion(baseMetrics.tm * 1.75, eval_h2, eval_h3, rowBias);
                    renderDynamicTrajectoryCurve(eval_h1, p3, p6, p12);
                }

                let horizonScalar = 1.0;
                if (STRATEGIC_ACTIVE_HORIZON === '3m')  { horizonScalar = 1.30; }
                if (STRATEGIC_ACTIVE_HORIZON === '6m')  { horizonScalar = 1.45; }
                if (STRATEGIC_ACTIVE_HORIZON === '12m') { horizonScalar = 1.75; }

                let calculatedModelPriceUSD = executeQuarticInversion(baseMetrics.tm * horizonScalar, eval_h2, eval_h3, rowBias);
                let variancePercentage = ((calculatedModelPriceUSD - eval_h1) / eval_h1) * 100;

                let displayedSpotPriceUSD = rowItem.actualPrice;
                let displayedSpotPriceGBP = displayedSpotPriceUSD * FX_USDBGB_CONVERSION_RATE;
                let netPositionValueGBP = (calculatedModelPriceUSD * FX_USDBGB_CONVERSION_RATE) * rowShares;

                let rowHTML = `
                    <tr style="${symbol === dropdownFocusSymbol && rowIndex === 0 ? 'background: rgba(56, 189, 248, 0.04); border-left: 3px solid var(--border-active);' : ''} ${rowIndex > 0 ? 'opacity: 0.55;' : ''}">
                        <td style="font-weight:700; color:#FFF;">${rowIndex > 0 ? '↳ ' : '⚡ '}${symbol}</td>
                        <td class="font-mono" style="color:var(--text-muted);">${rowItem.timestamp}</td>
                        <td class="font-mono">$${displayedSpotPriceUSD.toFixed(2)} / <span style="color:var(--border-active); font-weight:600;">£${displayedSpotPriceGBP.toFixed(2)}</span></td>
                        <td class="font-mono" style="font-weight:700; color:var(--border-active);">$${calculatedModelPriceUSD.toFixed(2)}</td>
                        <td class="${variancePercentage >= 0 ? 'pos-delta' : 'neg-delta'}">${variancePercentage >= 0 ? '+' : ''}${variancePercentage.toFixed(2)}%</td>
                        <td class="font-mono">${rowIndex > 0 ? '—' : rowShares.toLocaleString()}</td>
                        <td class="font-mono">${rowIndex > 0 ? '—' : '£' + rowEntryPriceGBP.toFixed(2)}</td>
                        <td class="font-mono" style="font-weight:700; color:#FFF;">${rowIndex > 0 ? '—' : '£' + netPositionValueGBP.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    </tr>
                `;

                if (activeNewsState && rowItem.newsString && symbol === dropdownFocusSymbol && STRATEGIC_ACTIVE_HORIZON === 'current' && rowIndex === 0) {
                    rowHTML += `
                        <tr class="news-injection-row">
                            <td colspan="8" class="news-box-content">
                                📰 [${symbol} CATALYST +${rowItem.weightAlpha.toFixed(2)}x]: "${rowItem.newsString}" <br>
                                ⚡ [VOLUMETRIC REBOUND]: Simplex Space 4D Hyper-Volume: ${baseMetrics.v4.toFixed(4)}
                            </td>
                        </tr>
                    `;
                }
                gridBodyElement.innerHTML += rowHTML;
            });
        });
    }
    window.onload = function() { executeManualPayloadSubmit(); toggleTrajectoryGraphVisibility(); animateQuantumDisplayWave(1.0); };
</script>

<script>
    let pChart, mChart, cSeries, mLineSeries, mZwaveSeries;

    const assetRegistryDb = {
        "LAES": { alpha: 5.88, beta: 1.85 },
        "TSLA": { alpha: 475.00, beta: 365.00 },
        "AAPL": { alpha: 350.00, beta: 267.00 },
        "NVDA": { alpha: 265.00, beta: 190.00 },
        "SPCX": { alpha: 185.35, beta: 139.10 },
        "GME":  { alpha: 42.50, beta: 15.50 },
        "RKTO": { alpha: 1.85, beta: 0.45 },
        "TTWO": { alpha: 245.00, beta: 185.00 },
        "SOC":  { alpha: 11.30, beta: 2.10 },
        "ABAT": { alpha: 6.50, beta: 1.30 },
        "BRTX": { alpha: 1.15, beta: 0.12 },
        "RR.L": { alpha: 1595.00, beta: 1385.00 }
    };

    function addNewTransactionRow() {
        const container = document.getElementById('transactionRowsContainer');
        const row = document.createElement('div');
        row.className = 'transaction-row';
        row.innerHTML = `
            <div class="input-group">
                <label>Purchase Price ($ / p)</label>
                <input type="number" class="tx-price" value="0.00" step="0.01" style="width: 150px;">
            </div>
            <div class="input-group">
                <label>Shares Bought</label>
                <input type="number" class="tx-shares" value="0" step="1" style="width: 150px;">
            </div>
            <div style="margin-top: 15px;"><button class="btn-delete" onclick="this.parentElement.parentElement.remove()">Delete</button></div>
        `;
        container.appendChild(row);
    }

    function buildCharts() {
        const layoutConfig = {
            layout: { backgroundColor: '#161b22', textColor: '#c9d1d9', fontSize: 10 },
            grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { borderColor: '#30363d', timeVisible: true },
        };
        pChart = LightweightCharts.createChart(document.getElementById('priceViewport'), layoutConfig);
        cSeries = pChart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false });

        mChart = LightweightCharts.createChart(document.getElementById('matrixViewport'), {
            ...layoutConfig,
            priceScale: { autoScale: false, mode: 0, scaleMargins: { top: 0.1, bottom: 0.1 } }
        });
        mLineSeries = mChart.addLineSeries({ color: '#ab47bc', lineWidth: 2 });
        mZwaveSeries = mChart.addLineSeries({ color: '#2979ff', lineWidth: 1.5, lineStyle: 2 });

        pChart.timeScale().subscribeVisibleTimeRangeChange(range => { mChart.timeScale().setVisibleRange(range); });
        mChart.timeScale().subscribeVisibleTimeRangeChange(range => { pChart.timeScale().setVisibleRange(range); });
    }

    async function computeTrendEngine() {
        const symbol = document.getElementById('tickerInput').value.toUpperCase().trim();
        const lookback = parseInt(document.getElementById('lookbackInput').value);
        
        const priceInputs = document.getElementsByClassName('tx-price');
        const shareInputs = document.getElementsByClassName('tx-shares');
        
        let totalCapitalInvested = 0;
        let totalSharesAccumulated = 0;
        
        for (let i = 0; i < priceInputs.length; i++) {
            let p = parseFloat(priceInputs[i].value) || 0;
            let s = parseFloat(shareInputs[i].value) || 0;
            totalCapitalInvested += (p * s);
            totalSharesAccumulated += s;
        }
        
        let volumeWeightedAverageCost = totalSharesAccumulated > 0 ? (totalCapitalInvested / totalSharesAccumulated) : 0;
        document.getElementById('ledger-avg-cost').innerText = volumeWeightedAverageCost.toFixed(2);

        const targetUrl = `https://yahoo.com{symbol}?range=6mo&interval=1d`;
        try {
            const response = await fetch(`https://corsproxy.io{encodeURIComponent(targetUrl)}`);
            const json = await response.json();
            const quotes = json.chart.result.indicators.quote;
            const timeline = json.chart.result.timestamp;

            let buffer = [];
            for (let i = 0; i < timeline.length; i++) {
                if (quotes.open[i] && quotes.high[i] && quotes.low[i] && quotes.close[i]) {
                    buffer.push({
                        time: new Date(timeline[i] * 1000).toISOString().split('T'),
                        open: quotes.open[i], high: quotes.high[i], low: quotes.low[i], close: quotes.close[i]
                    });
                }
            }

            let candleData = [], matrixData = [], zwaveData = [], signals = [];
            for (let i = 0; i < buffer.length; i++) {
                candleData.push(buffer[i]);
                let start = Math.max(0, i - lookback + 1);
                let win = buffer.slice(start, i + 1);
                let min = Math.min(...win.map(n => n.low)), max = Math.max(...win.map(n => n.high));
                let close = buffer[i].close;

                let norm = (max - min !== 0) ? (2 * ((close - min) / (max - min)) - 1) : 0;
                matrixData.push({ time: buffer[i].time, value: norm });
                zwaveData.push({ time: buffer[i].time, value: Math.sin(norm * Math.PI) });

                if (i > 0) {
                    if (matrixData[i-1].value <= -0.90 && norm > matrixData[i-1].value) {
                        signals.push({ time: buffer[i].time, position: 'belowBar', color: '#00e676', shape: 'arrowUp', text: 'BUY' });
                    } else if (matrixData[i-1].value >= 0.90 && norm < matrixData[i-1].value) {
                        signals.push({ time: buffer[i].time, position: 'aboveBar', color: '#ff1744', shape: 'arrowDown', text: 'SELL' });
                    }
                }
            }

            cSeries.setData(candleData);
            mLineSeries.setData(matrixData);
            mZwaveSeries.setData(zwaveData);
            cSeries.setMarkers(signals);

            const latestClose = buffer[buffer.length - 1].close;
            const currentPositionValue = latestClose * totalSharesAccumulated;
            const floatingReturn = currentPositionValue - totalCapitalInvested;
            const floatingPct = totalCapitalInvested > 0 ? (floatingReturn / totalCapitalInvested) * 100 : 0;

            const profitEl = document.getElementById('ledger-current-profit');
            profitEl.innerText = `${floatingReturn >= 0 ? '+' : ''}${floatingReturn.toFixed(2)} (${floatingReturn >= 0 ? '+' : ''}${floatingPct.toFixed(2)}%)`;
            profitEl.className = floatingReturn >= 0 ? "card-value text-green" : "card-value text-red";

            let alphaPrice = latestClose * 1.50, betaPrice = latestClose * 0.70;
            if (assetRegistryDb[symbol]) {
                alphaPrice = assetRegistryDb[symbol].alpha;
                betaPrice = assetRegistryDb[symbol].beta;
            }

            const alphaProfit = (alphaPrice * totalSharesAccumulated) - totalCapitalInvested;
            const alphaPct = totalCapitalInvested > 0 ? (alphaProfit / totalCapitalInvested) * 100 : 0;
            document.getElementById('ledger-alpha-profit').innerText = `+${alphaProfit.toFixed(2)} (+${alphaPct.toFixed(2)}%)`;

            const betaProfit = (betaPrice * totalSharesAccumulated) - totalCapitalInvested;
            const betaPct = totalCapitalInvested > 0 ? (betaProfit / totalCapitalInvested) * 100 : 0;
            document.getElementById('ledger-beta-profit').innerText = `${betaProfit >= 0 ? '+' : ''}${betaProfit.toFixed(2)} (${betaProfit >= 0 ? '+' : ''}${betaPct.toFixed(2)}%)`;

        } catch (e) { console.error("Telemetry Processing Interrupted:", e); }
    }

    window.onload = () => { buildCharts(); computeTrendEngine(); };
</script>
</body>
</html>
